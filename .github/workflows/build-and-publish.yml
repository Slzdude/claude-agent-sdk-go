name: Build and Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.4)'
        required: true
        type: string
      previous_tag:
        description: 'Previous release tag for changelog generation'
        required: false
        type: string
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify build
        run: go build ./...

      - name: Run tests
        run: go test -race ./...

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Update version file
        run: |
          sed -i "s/^const Version = \".*\"/const Version = \"$VERSION\"/" _version.go || true
          grep -q "Version = " _version.go 2>/dev/null || echo "package claude\n\nconst Version = \"$VERSION\"" > _version.go

      - name: Commit version changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: release v$VERSION"

      - name: Update changelog with Claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: "/generate-changelog new version: ${{ env.VERSION }}, old version: ${{ inputs.previous_tag }}"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools 'Bash(git add:*),Bash(git commit:*),Edit'

      - name: Push to main
        run: |
          git remote set-url origin git@github.com:anthropics/claude-agent-sdk-go.git
          git push origin main

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

          awk -v ver="$VERSION" '/^## / { if (found) exit; if ($2 == ver) found=1; next } found { print }' CHANGELOG.md > release_notes.md
          echo -e "\n---\n\n**Go module:** \`go get github.com/Slzdude/claude-agent-sdk-go@v$VERSION\`" >> release_notes.md

          gh release create "v$VERSION" --title "v$VERSION" --notes-file release_notes.md
